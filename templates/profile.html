<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>👤 Profile Pengguna</h1>
        <h2>Selamat datang, {{ username }}!</h2>
        
        <div style="background-color: #f9f9f9; padding: 20px; border-radius: 5px; margin-top: 20px;">
            <p><strong>Username:</strong> {{ username }}</p>
            <p>Ini adalah halaman profile untuk {{ username }}.</p>
        </div>
        
        <a href="/" style="margin-top: 20px; display: inline-block; padding: 10px 20px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px;">← Kembali ke Home</a>
    </div>
</body>
</html>
